name: Sync scores

# Vercel Hobby crons only fire once a day, which is useless for live scores,
# so the frequent sync runs here. GitHub's minimum interval is 5 minutes
# (and scheduled runs are best-effort, occasionally delayed under load).
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Hit the sync endpoint
        env:
          DEPLOY_URL: ${{ vars.DEPLOY_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$DEPLOY_URL" ]; then
            echo "DEPLOY_URL repo variable not set; skipping."
            exit 0
          fi
          curl -fsS -m 60 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${DEPLOY_URL%/}/api/sync" | head -c 800
          echo
